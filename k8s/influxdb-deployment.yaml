apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-pvc
  namespace: irrigacao
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: irrigacao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
      - name: influxdb
        image: influxdb:2.7
        env:
        - name: DOCKER_INFLUXDB_INIT_MODE
          value: setup
        - name: DOCKER_INFLUXDB_INIT_USERNAME
          value: admin
        - name: DOCKER_INFLUXDB_INIT_PASSWORD
          value: adminpass123
        - name: DOCKER_INFLUXDB_INIT_ORG
          value: fazenda
        - name: DOCKER_INFLUXDB_INIT_BUCKET
          value: irrigation
        - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
          value: irrigacao-token
        - name: DOCKER_INFLUXDB_INIT_RETENTION
          value: 30d
        ports:
        - containerPort: 8086
        volumeMounts:
        - name: influx-storage
          mountPath: /var/lib/influxdb2
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: influx-storage
        persistentVolumeClaim:
          claimName: influxdb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: irrigacao
spec:
  selector:
    app: influxdb
  ports:
  - port: 8086