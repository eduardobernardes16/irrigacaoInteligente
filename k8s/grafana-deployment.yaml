apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: irrigacao
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: InfluxDB-Irrigacao
        type: influxdb
        access: proxy
        url: http://influxdb:8086
        jsonData:
          version: Flux
          organization: fazenda
          defaultBucket: irrigation
        secureJsonData:
          token: irrigacao-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: irrigacao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.3.0
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: datasource-vol
          mountPath: /etc/grafana/provisioning/datasources
      volumes:
      - name: datasource-vol
        configMap:
          name: grafana-datasource
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: irrigacao
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30001